name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node 24 only: the committed lockfile resolves vitest's optional
        # vite->esbuild dedupe in a way npm 11 (bundled with Node 24) accepts but
        # npm 10 (Node 20/22) rejects under `npm ci`. Pinning to npm 11 keeps the
        # v0.3.0 build deps untouched. See README/handoff for the regen option.
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (includes the read-only proof)
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
